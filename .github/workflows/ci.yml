name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python lint ──────────────────────────────────────────
  lint:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff>=0.4.0
      - name: Ruff check
        run: ruff check neurosync/
      - name: Ruff format check
        run: ruff format --check neurosync/

  # ── Python tests (matrix) ───────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ matrix.python-version }}-
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests with coverage (fails below 85%)
        run: >
          pytest
          --cov=neurosync
          --cov-report=xml
          --cov-report=term-missing
          --cov-fail-under=85
          -v

  # ── Frontend typecheck + build ──────────────────────────
  frontend:
    name: Frontend (TypeScript + Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: node-
      - name: Install dependencies
        run: npm ci
      - name: TypeScript type check
        run: npm run typecheck
      - name: Production build
        run: npm run build

  # ── PR quality gate ─────────────────────────────────────
  pr-check:
    name: PR Quality
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PR must reference an issue
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            // Only accept explicit issue-closing keywords (Fixes #N, Closes #N, Resolves #N)
            // Bare #N is NOT accepted — it matches false positives like "phase #2"
            const issuePattern = /(fix(es)?|close[sd]?|resolve[sd]?)\s+#\d+/i;
            const naPattern = /related issue[:\s]*n\/a/i;

            if (issuePattern.test(body)) {
              console.log('✓ PR references an issue');
            } else if (naPattern.test(body)) {
              console.log('⚠ PR marked as N/A for issue — reviewer should verify this is appropriate');
            } else {
              core.setFailed(
                'PR must reference a GitHub issue in the body.\n' +
                'Use: "Fixes #123", "Closes #456", or "Resolves #789".\n' +
                'For PRs without an issue (typo fixes, etc.), write "Related issue: N/A".'
              );
            }

      - name: PR title length check
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            if (title.length > 72) {
              core.setFailed(`PR title is ${title.length} chars — keep it under 72. Use the description for details.`);
            }
            if (title.length < 10) {
              core.setFailed(`PR title is too short (${title.length} chars). Be descriptive.`);
            }

      - name: PR must have description
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            // Strip template scaffolding to measure only contributor-written content
            const cleaned = body
              .replace(/<!--[\s\S]*?-->/g, '')       // HTML comments
              .replace(/^#{1,4}\s+.+$/gm, '')        // Markdown headings
              .replace(/^- \[ \] .+$/gm, '')         // Unchecked checkboxes
              .replace(/^- \[x\] .+$/gm, '')         // Checked checkboxes
              .replace(/^Fixes #\s*$/gm, '')         // Unfilled "Fixes #" stub
              .replace(/^\d+\.\s*$/gm, '')           // Empty numbered list items
              .replace(/^-\s*$/gm, '')               // Empty bullet items
              .trim();

            if (cleaned.length < 50) {
              core.setFailed(
                'PR description is too short. Fill out the Summary, Changes, and How to Test sections.\n' +
                'Template headings and checkboxes do not count — write actual content.'
              );
            }
